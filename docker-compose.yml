services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sellthat
      POSTGRES_PASSWORD: sellthat
      POSTGRES_DB: sellthat
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/initdb:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellthat -d sellthat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - data
    stop_grace_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://sellthat:sellthat@postgres:5432/sellthat
      PORT: "3000"
    ports:
      - "127.0.0.1:3300:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://127.0.0.1:3000/api/health'); process.exit(response.ok ? 0 : 1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - data
      - edge
    stop_grace_period: 15s

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "127.0.0.1:3390:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - edge
    stop_grace_period: 10s

volumes:
  pgdata:

networks:
  data:
    internal: true
  edge:
